.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}.card-body{padding:16px 20px}.tbl-wrap{overflow-x:auto}

.tfoot-row td{font-weight:600;background:var(--surface2);border-top:1.5px solid var(--border2);padding:10px 14px}
.subtotal-row td{font-weight:600;background:var(--surface2);font-size:12px;padding:6px 14px;color:var(--text2)}

  destroyCharts(); currentPage=p; filterMes='Todos';

  var T={resumo:'Resumo Geral',iinm:'IIN Matriz/PVH',iinms:'IIN MS',ls:'LS Informática',lsms:'LS MS',mdc:'MDC',sasi:'SASI'};
  document.getElementById('topbar-title').textContent=T[p]||p;
  if(p==='resumo') renderResumo(); else renderEmpresa(p);
}

function buildTxRows(txs){
  if(!txs||!txs.length) return "<tr><td colspan='4' style='text-align:center;color:var(--text3);padding:24px'>Nenhum lançamento neste mês</td></tr>";
  var rows='', i=0;
  while(i<txs.length){
    var p=(txs[i][0]||'').split('/');
    var mk=(p[1]||'00')+'/'+(p[2]||'0000');
    var j=i, sub=0;
    while(j<txs.length){
      var p2=(txs[j][0]||'').split('/');
      if((p2[1]||'00')+'/'+(p2[2]||'0000')!==mk) break;
      var nf=txs[j][3]?'<span class="nf-badge">'+txs[j][3]+'</span>':'';
      rows+='<tr><td class="muted">'+txs[j][0]+'</td><td style="font-weight:500">'+txs[j][1]+'</td><td class="r">'+fmt(txs[j][2])+'</td><td>'+nf+'</td></tr>';
      sub+=txs[j][2]; j++;
    }
    rows+='<tr class="subtotal-row"><td class="muted" colspan="2">Total '+(MMAP_NOME[p[1]]||p[1])+'</td><td class="r" style="border-top:1px solid var(--border2)">'+fmt(sub)+'</td><td style="border-top:1px solid var(--border2)"></td></tr>';
    i=j;
  }
  return rows;
}

function renderResumo(){
  var totMes=MESES.map(function(m){ return KEYS.reduce(function(s,k){ return s+(D[k].pm[m]||0); },0); });
  var maxTM=Math.max.apply(null,totMes.filter(function(v){ return v>0; }));
  var melhorMes=maxTM>0?MESES[totMes.indexOf(maxTM)]:'—';
  var nCli=new Set(KEYS.reduce(function(a,k){ return a.concat(Object.keys(D[k].cli)); },[])).size;
  var empT=KEYS.map(function(k){ return {k:k,total:D[k].total}; }).sort(function(a,b){ return b.total-a.total; });
  var maxE=empT[0].total;
  var activeMeses=MESES.filter(function(_,i){ return totMes[i]>0; });

  var empRows='';
  empT.forEach(function(e){
    var mCols=activeMeses.map(function(m){ return "<td class='r'>"+(D[e.k].pm[m]?fmtK(D[e.k].pm[m]):"<span style='color:var(--text3)'>—</span>")+"</td>"; }).join('');
    var barW=(e.total/maxE*100).toFixed(1);
    empRows+="<tr style='cursor:pointer' onclick='goPage(\""+e.k+"\")'><td><span style='display:inline-flex;align-items:center;gap:7px;font-weight:500'><span style='width:8px;height:8px;border-radius:50%;background:"+COR[e.k]+";flex-shrink:0'></span>"+NOME[e.k]+"</span></td>"+mCols+"<td class='r' style='font-weight:600'>"+fmt(e.total)+"</td><td><div class='bar-row'><div class='bar-track'><div class='bar-fill' style='width:"+barW+"%;background:"+COR[e.k]+"'></div></div><span style='font-size:11px;color:var(--text3);min-width:36px;text-align:right;font-family:DM Mono,monospace'>"+pct(e.total,TOTAL_GRUPO)+"</span></div></td></tr>";
  });

  var doughLegend='';
  empT.forEach(function(e){
    doughLegend+="<div style='margin-bottom:9px'><div style='display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px'><span style='display:flex;align-items:center;gap:5px;font-weight:500'><span style='width:7px;height:7px;border-radius:50%;background:"+COR[e.k]+";display:inline-block'></span>"+NOME[e.k]+"</span><span style='font-family:DM Mono,monospace;color:var(--text2)'>"+pct(e.total,TOTAL_GRUPO)+"</span></div><div class='bar-track'><div class='bar-fill' style='width:"+(e.total/maxE*100).toFixed(1)+"%;background:"+COR[e.k]+"'></div></div></div>";
  });

  var headCols=activeMeses.map(function(m){ return "<th class='r'>"+m+"</th>"; }).join('');
  var totCols=activeMeses.map(function(_,i){ return "<td class='r'>"+fmtK(totMes[MESES.indexOf(activeMeses[i])])+"</td>"; }).join('');

  document.getElementById('content').innerHTML=
    "<div class='kpi-row'>"+
      "<div class='kpi-card accent'><div class='kpi-label'>Total recebido</div><div class='kpi-value'>"+fmtM(TOTAL_GRUPO)+"</div><div class='kpi-sub'>Jan–Jun 2026 · Grupo consolidado</div></div>"+
      "<div class='kpi-card'><div class='kpi-label'>Empresas</div><div class='kpi-value'>6</div><div class='kpi-sub'>ativas no período</div></div>"+
      "<div class='kpi-card'><div class='kpi-label'>Clientes distintos</div><div class='kpi-value'>"+nCli+"</div><div class='kpi-sub'>no grupo</div></div>"+
      "<div class='kpi-card'><div class='kpi-label'>Melhor mês</div><div class='kpi-value'>"+melhorMes+"</div><div class='kpi-sub'>"+(maxTM>0?fmtM(maxTM):'')+"</div></div>"+
    "</div>"+
    "<div class='grid2'>"+
      "<div class='card'><div class='card-header'><span class='card-title'>Evolução mensal consolidada</span></div><div class='card-body'><div style='position:relative;height:220px'><canvas id='cLine'></canvas></div></div></div>"+
      "<div class='card'><div class='card-header'><span class='card-title'>Participação por empresa</span></div><div class='card-body' style='display:flex;gap:16px;align-items:center'><div style='position:relative;width:140px;height:140px;flex-shrink:0'><canvas id='cDough'></canvas></div><div style='flex:1'>"+doughLegend+"</div></div></div>"+
    "</div>"+
    "<div class='section-heading'>Detalhamento por empresa</div>"+
    "<div class='card'><div class='tbl-wrap'><table><thead><tr><th>Empresa</th>"+headCols+"<th class='r'>Total</th><th style='min-width:130px'>% grupo</th></tr></thead><tbody>"+empRows+"</tbody><tfoot><tr class='tfoot-row'><td>Total Grupo</td>"+totCols+"<td class='r'>"+fmt(TOTAL_GRUPO)+"</td><td></td></tr></tfoot></table></div></div>";

  var c1=new Chart(document.getElementById('cLine'),{type:'line',data:{labels:activeMeses,datasets:KEYS.map(function(k){ return {label:NOME[k],data:activeMeses.map(function(m){ return D[k].pm[m]||0; }),borderColor:COR[k],backgroundColor:'transparent',tension:.35,pointRadius:3,borderWidth:2,pointBackgroundColor:COR[k]}; })},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return c.dataset.label+': '+fmt(c.raw); }}}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{callback:function(v){ return fmtK(v); },font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}}}}});
  var c2=new Chart(document.getElementById('cDough'),{type:'doughnut',data:{labels:KEYS.map(function(k){ return NOME[k]; }),datasets:[{data:KEYS.map(function(k){ return D[k].total; }),backgroundColor:KEYS.map(function(k){ return COR[k]; }),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return c.label+': '+fmtM(c.raw); }}}}}});
  activeCharts.push(c1,c2);
}

function renderEmpresa(k){
  var e=D[k]; var cor=COR[k];
  var clis=Object.entries(e.cli).sort(function(a,b){ return b[1]-a[1]; });
  var maxCli=clis[0][1];
  var totMesGrupo=MESES.map(function(m){ return KEYS.reduce(function(s,k2){ return s+(D[k2].pm[m]||0); },0); });
  var melhorMesVal=Math.max.apply(null,MESES.map(function(m){ return e.pm[m]||0; }));
  var melhorMes=melhorMesVal>0?MESES.find(function(m){ return (e.pm[m]||0)===melhorMesVal; }):'—';
  var activeMeses=MESES.filter(function(m){ return e.pm[m]; });
  var txsFilt=filterMes==='Todos'?e.txs:e.txs.filter(function(t){ var mm=t[0]?t[0].split('/')[1]:''; return MMAP_NUM[mm]===filterMes; });

  var cliRows='';
  clis.forEach(function(item,i){
    var cli=item[0]; var val=item[1];
    cliRows+='<tr><td class="muted">'+(i+1)+'</td><td style="font-weight:'+(i<3?'600':'400')+'">'+cli+'</td><td class="r">'+fmt(val)+'</td><td class="r muted">'+pct(val,e.total)+'</td><td><div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:'+(val/maxCli*100).toFixed(1)+'%;background:'+cor+'"></div></div></div></td></tr>';
  });

  var mesPills=['Todos'].concat(MESES).map(function(m){
    return '<button class="mpill'+(filterMes===m?' active':'')+'" onclick="setMes(\''+k+'\',\''+m+'\')">'+m+'</button>';
  }).join('');

  document.getElementById('content').innerHTML=
    "<div style='display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);border-left:4px solid "+cor+"'><div><div style='font-size:15px;font-weight:600'>"+NOME[k]+"</div><div style='font-size:12px;color:var(--text3);margin-top:2px'>"+FULL[k]+"</div></div></div>"+
    "<div class='kpi-row'>"+
      "<div class='kpi-card' style='border-left:4px solid "+cor+"'><div class='kpi-label'>Total recebido</div><div class='kpi-value' style='color:"+cor+"'>"+fmtM(e.total)+"</div><div class='kpi-sub'>Jan–Jun 2026</div></div>"+
      "<div class='kpi-card'><div class='kpi-label'>% do grupo</div><div class='kpi-value'>"+pct(e.total,TOTAL_GRUPO)+"</div><div class='kpi-sub'>de "+fmtM(TOTAL_GRUPO)+"</div></div>"+
      "<div class='kpi-card'><div class='kpi-label'>Transações</div><div class='kpi-value'>"+e.qtd+"</div><div class='kpi-sub'>lançamentos</div></div>"+
      "<div class='kpi-card'><div class='kpi-label'>Melhor mês</div><div class='kpi-value'>"+melhorMes+"</div><div class='kpi-sub'>"+(melhorMesVal>0?fmtM(melhorMesVal):'')+"</div></div>"+
    "</div>"+
    "<div class='grid2'>"+
      "<div class='card'><div class='card-header'><span class='card-title'>Recebimentos mensais</span></div><div class='card-body'><div style='position:relative;height:200px'><canvas id='cBar'></canvas></div></div></div>"+
      "<div class='card'><div class='card-header'><span class='card-title'>Participação mensal no grupo</span></div><div class='card-body'><div style='position:relative;height:200px'><canvas id='cPct'></canvas></div></div></div>"+
    "</div>"+
    "<div class='section-heading'>Clientes — recebimentos acumulados</div>"+
    "<div class='card' style='margin-bottom:20px'><div class='tbl-wrap'><table><thead><tr><th>#</th><th>Cliente</th><th class='r'>Total (R$)</th><th class='r'>% empresa</th><th style='min-width:140px'>Distribuição</th></tr></thead><tbody>"+cliRows+"</tbody><tfoot><tr class='tfoot-row'><td></td><td>Total</td><td class='r'>"+fmt(e.total)+"</td><td class='r muted'>100%</td><td></td></tr></tfoot></table></div></div>"+
    "<div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px'><div class='section-heading' style='margin:0'>Lançamentos ("+txsFilt.length+")</div><div class='month-filter'>"+mesPills+"</div></div>"+
    "<div class='card'><div class='tbl-wrap'><table><thead><tr><th>Data</th><th>Cliente</th><th class='r'>Valor (R$)</th><th>NF</th></tr></thead><tbody id='tx-body'></tbody></table></div></div>";

  document.getElementById('tx-body').innerHTML=buildTxRows(txsFilt);

  var c1=new Chart(document.getElementById('cBar'),{type:'bar',data:{labels:activeMeses,datasets:[{label:'Recebido',data:activeMeses.map(function(m){ return e.pm[m]||0; }),backgroundColor:cor+'CC',borderColor:cor,borderWidth:1,borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return fmt(c.raw); }}}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{callback:function(v){ return fmtK(v); },font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}}}}});
  var activeMesesG=MESES.filter(function(_,i){ return totMesGrupo[i]>0; });
  var c2=new Chart(document.getElementById('cPct'),{type:'line',data:{labels:activeMesesG,datasets:[{label:'%',data:activeMesesG.map(function(m){ var i=MESES.indexOf(m); return totMesGrupo[i]>0?+((e.pm[m]||0)/totMesGrupo[i]*100).toFixed(1):0; }),borderColor:cor,backgroundColor:cor+'18',tension:.35,fill:true,pointRadius:4,pointBackgroundColor:cor,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){ return c.raw.toFixed(1)+'% do mês'; }}}},scales:{x:{ticks:{font:{size:11}}},y:{min:0,max:100,ticks:{callback:function(v){ return v+'%'; },font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}}}}});
  activeCharts.push(c1,c2);
}

function setMes(k,m){ filterMes=m; destroyCharts(); renderEmpresa(k); }

goPage('resumo');

</script>
</body>
</html>
